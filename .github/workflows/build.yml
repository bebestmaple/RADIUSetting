name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libssl-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev

      - name: Install frontend deps
        run: npm install

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: npm run tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: npm run tauri build

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
        run: npm run tauri build

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME

          # MSI
          $msi = Get-ChildItem -Path 'target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            Copy-Item $msi.FullName (Join-Path release-assets "RADIUS-Client-$VERSION-Windows.msi")
            Write-Host "MSI copied"
          }

          # NSIS
          $nsis = Get-ChildItem -Path 'target/release/bundle/nsis' -Recurse -Include *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $nsis) {
            Copy-Item $nsis.FullName (Join-Path release-assets "RADIUS-Client-$VERSION-Windows-Setup.exe")
            Write-Host "NSIS copied"
          }

          # Portable
          $exe = Get-ChildItem -Path 'target/release' -Include 'radius-client.exe','RADIUS Client.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $exe) {
            $portableDir = 'release-assets/RADIUS-Client-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exe.FullName "$portableDir/RADIUS Client.exe"
            @"
          # RADIUS Client portable build marker
          portable=true
          "@ | Out-File -FilePath "$portableDir/portable.ini" -Encoding UTF8
            Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/RADIUS-Client-$VERSION-Windows-Portable.zip" -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Portable created"
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          APPIMAGE=$(find target/release/bundle -name "*.AppImage" | head -1 || true)
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" "release-assets/RADIUS-Client-${VERSION}-Linux.AppImage"

          DEB=$(find target/release/bundle -name "*.deb" | head -1 || true)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/RADIUS-Client-${VERSION}-Linux.deb"

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"

          DMG=$(find target/release/bundle/dmg -name "*.dmg" | head -1 || true)
          [ -n "$DMG" ] && cp "$DMG" "release-assets/RADIUS-Client-${VERSION}-macOS.dmg"

          APP=$(find target/release/bundle/macos -name "*.app" | head -1 || true)
          if [ -n "$APP" ]; then
            cd target/release/bundle/macos
            zip -r "../../../../release-assets/RADIUS-Client-${VERSION}-macOS.zip" "$(basename "$APP")"
            cd ../../../..
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RADIUS Client ${{ github.ref_name }}
          body: |
            ## RADIUS Client ${{ github.ref_name }}

            ### Windows
            - **MSI**: `RADIUS-Client-${{ github.ref_name }}-Windows.msi`
            - **NSIS**: `RADIUS-Client-${{ github.ref_name }}-Windows-Setup.exe`
            - **Portable**: `RADIUS-Client-${{ github.ref_name }}-Windows-Portable.zip`

            ### Linux
            - **AppImage**: `RADIUS-Client-${{ github.ref_name }}-Linux.AppImage`
            - **Deb**: `RADIUS-Client-${{ github.ref_name }}-Linux.deb`

            ### macOS
            - **DMG**: `RADIUS-Client-${{ github.ref_name }}-macOS.dmg`
            - **ZIP**: `RADIUS-Client-${{ github.ref_name }}-macOS.zip`
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
